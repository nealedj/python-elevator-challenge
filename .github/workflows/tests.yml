name: tests

on:
  push:
    branches: [master, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  doctests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Challenge suite
        run: python -m doctest tests/CHALLENGE.md -o NORMALIZE_WHITESPACE
      - name: Scenario suite
        run: python -m doctest tests/SCENARIOS.md -o NORMALIZE_WHITESPACE
      - name: Elevator bank suite
        run: python -m doctest tests/CLUSTER.md -o NORMALIZE_WHITESPACE
      - name: Destination dispatch suite
        run: python -m doctest tests/DESTINATION.md -o NORMALIZE_WHITESPACE
      - name: README usage examples
        run: python -m doctest README.md -o NORMALIZE_WHITESPACE
      - name: Dispatcher benchmark (asserts delivery on every run)
        run: python -m elevators.benchmark
