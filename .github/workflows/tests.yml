name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  doctests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: README suite
        run: python -m doctest README.md -o NORMALIZE_WHITESPACE
      - name: Scenario suite
        run: python -m doctest SCENARIOS.md -o NORMALIZE_WHITESPACE
      - name: Elevator bank suite
        run: python -m doctest CLUSTER.md -o NORMALIZE_WHITESPACE
      - name: Dispatcher benchmark (asserts delivery on every run)
        run: python benchmark.py
